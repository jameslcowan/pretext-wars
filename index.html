<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#04040a" />
  <title>Pretext Showcase</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cantata+One&display=swap" rel="stylesheet" />
  <script src="https://code.iconify.design/iconify-icon/2.3.0/iconify-icon.min.js"></script>
</head>
<body>
  <div id="loading"><span class="loading-text">I dwell in Possibility</span></div>
  <div id="flash"></div>
  <div id="dmg-vignette"></div>
  <canvas id="stars"></canvas>

  <!-- Spaceship cursor -->
  <svg id="ship" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg">
    <ellipse cx="18" cy="32" rx="4" ry="2" fill="#5bc4c4" opacity="0.4"/>
    <path d="M18 2 L24 26 L21 28 L18 24 L15 28 L12 26 Z" fill="#3a4a5a" stroke="#6aa0b0" stroke-width="0.6"/>
    <path d="M18 4 L21 20 L18 17 L15 20 Z" fill="#5bc4c4" opacity="0.6"/>
    <path d="M12 26 L8 30 L10 25 Z" fill="#4a6a7a" stroke="#5bc4c4" stroke-width="0.3"/>
    <path d="M24 26 L28 30 L26 25 Z" fill="#4a6a7a" stroke="#5bc4c4" stroke-width="0.3"/>
    <circle cx="18" cy="8" r="1.2" fill="#b8f0f0" opacity="0.7"/>
  </svg>

  <div id="stage">
    <div id="text-container"></div>
  </div>

  <!-- HUD -->
  <div id="hud">
    <div id="hud-left">
      <div id="level-display">LVL 1</div>
    </div>
    <div id="hud-center">
      <div id="hp-label">HULL</div>
      <div id="hp-container">
        <div id="hp-bar"></div>
        <span id="hp-text">100</span>
      </div>
    </div>
    <div id="hud-right">
      <div id="score-display">0</div>
    </div>
  </div>

  <!-- Boss HP -->
  <div id="boss-hud" class="hidden">
    <div id="boss-label"></div>
    <div id="boss-hp-container">
      <div id="boss-hp-bar"></div>
    </div>
  </div>

  <!-- Buff indicator -->
  <div id="buff-indicator"></div>
</body>
</html>
